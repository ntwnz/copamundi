<!DOCTYPE html>
  <html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <title>Simulador da Copa do Mundo</title>
    <style>
      body, html {
        margin: 0;
        padding: 0;
        height: 100%;
        background: url('background.png') no-repeat center/contain;
        font-family: Arial, sans-serif;
        color: #fff;
      }
      .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        padding-top: 2rem;
        backdrop-filter: brightness(0.7);
      }
      .group {
        margin: 0.5rem;
        text-align: center;
      }
      .flag {
        width: 40px;
        height: 30px;
        object-fit: contain;
        margin: 0 4px;
      }
    </style>
  </head>
  <body>
    <div class="overlay" id="app">Abc</div>

    <script src="script.js"></script>
  </body>
  </html>
